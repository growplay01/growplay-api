<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>GrowPlay Ranking</title>
</head>

<body>

<h1>🏆 Ranking GrowPlay</h1>

<button onclick="addPoints()">Ganhar +50 pontos</button>
<button onclick="loadRanking()">Atualizar Ranking</button>

<ul id="ranking"></ul>

<script>

const API = "https://growplay-api.onrender.com"

async function loadRanking(){

const res = await fetch(API + "/ranking")
const data = await res.json()

const ranking = document.getElementById("ranking")

ranking.innerHTML = ""

data.forEach(user => {

const li = document.createElement("li")

li.innerText = user.name + " - " + user.points + " pontos"

ranking.appendChild(li)

})

}

async function addPoints(){

await fetch(API + "/addpoints",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
id:1,
points:50
})

})

loadRanking()

}

loadRanking()

</script>

</body>

</html>
