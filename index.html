<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>GrowPlay</title>
</head>

<body>

<h1>🎮 GrowPlay</h1>

<h2>Criar Usuário</h2>

<input id="name" placeholder="Nome">
<input id="email" placeholder="Email">

<button onclick="createUser()">Criar Conta</button>

<hr>

<h2>🏆 Ranking</h2>

<button onclick="addPoints()">Ganhar +50 pontos</button>
<button onclick="loadRanking()">Atualizar Ranking</button>

<ul id="ranking"></ul>

<script>

const API = "https://growplay-api.onrender.com"

async function createUser(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value

await fetch(API + "/users",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
name,
email
})

})

alert("Usuário criado!")

loadRanking()

}

async function loadRanking(){

const res = await fetch(API + "/ranking")
const data = await res.json()

const ranking = document.getElementById("ranking")

ranking.innerHTML = ""

data.forEach(user => {

const li = document.createElement("li")

li.innerText = user.name + " - " + user.points + " pontos"

ranking.appendChild(li)

})

}

async function addPoints(){

await fetch(API + "/addpoints",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
id:1,
points:50
})

})

loadRanking()

}

loadRanking()

</script>

</body>

</html>

</body>

</html>
